<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Truth or Dare For My Fans</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;700&display=swap">
    <style>
        :root {
            --red: #CC0000; --dark-red: #990000; --gold: #D4A574; --gold-light: #F0C890;
            --gold-dim: rgba(212,165,116,0.35); --cream: #FDF6EC; --text: #C9B99A;
            --text-dim: #9A8A72; --dark: #120500;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--red);
            background-image: radial-gradient(ellipse at 15% 10%, rgba(212,165,116,0.12) 0%, transparent 45%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--text);
        }
        .card {
            background: #1a0000;
            border: 2px solid rgba(204,0,0,0.8);
            border-radius: 14px;
            padding: 48px 44px;
            max-width: 460px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7);
        }
        .logo { font-family: 'Playfair Display', serif; font-size: 15px; color: var(--gold); margin-bottom: 28px; text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--cream); font-size: 28px; font-weight: 900; margin-bottom: 8px; }
        p.sub { font-size: 14px; color: var(--text-dim); margin-bottom: 28px; }
        label { font-size: 12px; color: var(--gold-light); text-transform: uppercase; letter-spacing: 0.8px; display: block; margin-bottom: 6px; }
        input {
            width: 100%; padding: 14px 16px; margin-bottom: 20px;
            background: rgba(0,0,0,0.4); border: 1.5px solid var(--gold-dim);
            border-radius: 6px; color: var(--cream); font-size: 16px; outline: none;
            font-family: 'DM Sans', sans-serif;
        }
        input:focus { border-color: var(--gold); }
        .btn {
            width: 100%; padding: 16px; background: var(--red); color: #fff;
            border: none; border-radius: 8px; font-size: 18px; font-weight: 900;
            cursor: pointer; letter-spacing: 1px; text-transform: uppercase;
            font-family: 'DM Sans', sans-serif;
        }
        .btn:hover { background: var(--dark-red); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .msg { margin-top: 18px; padding: 12px 16px; border-radius: 6px; font-size: 14px; text-align: center; display: none; }
        .msg.success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.4); color: #4ade80; }
        .msg.error { background: rgba(204,0,0,0.15); border: 1px solid rgba(204,0,0,0.4); color: #ff6b6b; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: var(--gold-light); font-size: 13px; text-decoration: none; }
        .back-link:hover { color: var(--gold); }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🎭 Truth or Dare For My Fans</div>

        <!-- Step 1: Request reset -->
        <div id="step-request">
            <h2>🔑 Forgot Password?</h2>
            <p class="sub">Enter your email and we'll send you a reset link.</p>
            <label>Email Address</label>
            <input type="email" id="reset-email" placeholder="you@example.com">
            <button class="btn" id="send-btn" onclick="sendReset()">SEND RESET LINK →</button>
            <div class="msg" id="request-msg"></div>
            <a href="/" class="back-link">← Back to site</a>
        </div>

        <!-- Step 2: Set new password (shown when ?token= is in URL) -->
        <div id="step-newpass" style="display:none;">
            <h2>🔒 Set New Password</h2>
            <p class="sub">Choose a new password for your account.</p>
            <label>New Password</label>
            <input type="password" id="new-password" placeholder="At least 8 characters">
            <label>Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Repeat your new password">
            <button class="btn" id="reset-btn" onclick="doReset()">SET NEW PASSWORD →</button>
            <div class="msg" id="reset-msg"></div>
        </div>
    </div>

    <script>
        const BACKEND = 'https://truthordare-backend.onrender.com';

        // Check if we have a token in the URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        if (token) {
            document.getElementById('step-request').style.display = 'none';
            document.getElementById('step-newpass').style.display = 'block';
        }

        function showMsg(id, text, type) {
            const el = document.getElementById(id);
            el.textContent = text;
            el.className = `msg ${type}`;
            el.style.display = 'block';
        }

        async function sendReset() {
            const email = document.getElementById('reset-email').value.trim();
            if (!email) { showMsg('request-msg', 'Please enter your email address.', 'error'); return; }
            const btn = document.getElementById('send-btn');
            btn.disabled = true; btn.textContent = 'Sending...';
            try {
                const res = await fetch(`${BACKEND}/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });
                const data = await res.json();
                showMsg('request-msg', data.message || 'Reset link sent! Check your email.', 'success');
                btn.textContent = '✓ Email Sent';
            } catch (err) {
                showMsg('request-msg', 'Something went wrong. Please try again.', 'error');
                btn.disabled = false; btn.textContent = 'SEND RESET LINK →';
            }
        }

        async function doReset() {
            const password = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            if (!password || password.length < 8) { showMsg('reset-msg', 'Password must be at least 8 characters.', 'error'); return; }
            if (password !== confirm) { showMsg('reset-msg', 'Passwords do not match.', 'error'); return; }
            const btn = document.getElementById('reset-btn');
            btn.disabled = true; btn.textContent = 'Saving...';
            try {
                const res = await fetch(`${BACKEND}/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password }),
                });
                const data = await res.json();
                if (!res.ok) { showMsg('reset-msg', data.error || 'Reset failed.', 'error'); btn.disabled = false; btn.textContent = 'SET NEW PASSWORD →'; return; }
                showMsg('reset-msg', '✓ Password reset! Redirecting to login...', 'success');
                setTimeout(() => window.location.href = '/?login=creator', 2000);
            } catch (err) {
                showMsg('reset-msg', 'Something went wrong. Please try again.', 'error');
                btn.disabled = false; btn.textContent = 'SET NEW PASSWORD →';
            }
        }

        // Allow pressing Enter to submit
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (token) doReset();
                else sendReset();
            }
        });
    </script>
</body>
</html>
