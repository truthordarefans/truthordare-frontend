<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm Your Booking — Truth or Dare Fans</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet" />
    <style>
        :root {
            --dark: #0d0d1a;
            --dark2: #1a1a2e;
            --gold: #D4A574;
            --gold-dim: rgba(212,165,116,0.25);
            --cream: #F5EDD6;
            --text: #c8c8d8;
            --text-dim: #888;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--dark);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .card {
            background: var(--dark2);
            border: 1px solid var(--gold-dim);
            border-radius: 16px;
            padding: 40px 36px;
            max-width: 520px;
            width: 100%;
            text-align: center;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--gold);
            margin-bottom: 28px;
            letter-spacing: 0.5px;
        }
        .status-icon { font-size: 52px; margin-bottom: 16px; }
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--cream);
            margin-bottom: 10px;
        }
        .subtitle {
            font-size: 14px;
            color: var(--text-dim);
            margin-bottom: 28px;
            line-height: 1.6;
        }
        .details-box {
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--gold-dim);
            border-radius: 10px;
            padding: 20px 24px;
            text-align: left;
            margin-bottom: 28px;
        }
        .detail-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
            font-size: 14px;
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-label { color: var(--text-dim); }
        .detail-value { color: var(--cream); font-weight: 600; }
        .btn-pay {
            display: block;
            width: 100%;
            background: linear-gradient(135deg, #D4A574, #c49060);
            color: #0d0d1a;
            border: none;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            letter-spacing: 0.3px;
            transition: opacity 0.2s;
        }
        .btn-pay:hover { opacity: 0.9; }
        .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
        .note {
            font-size: 12px;
            color: var(--text-dim);
            margin-top: 14px;
            line-height: 1.5;
        }
        .error-state { color: #FF6B6B; }
        .loading-state { color: var(--text-dim); }
        .badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .badge.accepted { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
        .badge.proposed { background: rgba(212,165,116,0.15); color: #D4A574; border: 1px solid rgba(212,165,116,0.3); }
        .badge.paid { background: rgba(99,102,241,0.15); color: #818cf8; border: 1px solid rgba(99,102,241,0.3); }
        .badge.declined { background: rgba(204,0,0,0.15); color: #FF6B6B; border: 1px solid rgba(204,0,0,0.3); }
        .divider { border: none; border-top: 1px solid rgba(255,255,255,0.07); margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card" id="mainCard">
        <div class="logo">Truth or Dare Fans</div>
        <div id="content">
            <div class="status-icon">⏳</div>
            <h1>Loading your booking...</h1>
            <p class="subtitle loading-state">Please wait while we fetch your booking details.</p>
        </div>
    </div>

    <script>
        const BACKEND = 'https://truthordare-backend.onrender.com';

        function getParam(name) {
            return new URLSearchParams(window.location.search).get(name);
        }

        async function loadBooking() {
            const bookingId = getParam('id');
            const token = getParam('token');

            if (!bookingId || !token) {
                showError('Invalid link. Please check your email for the correct booking confirmation link.');
                return;
            }

            try {
                const res = await fetch(`${BACKEND}/booking/${bookingId}/fan-view?token=${encodeURIComponent(token)}`);
                const data = await res.json();

                if (!res.ok) {
                    showError(data.error || 'Could not load booking. The link may have expired.');
                    return;
                }

                renderBooking(data.booking, bookingId, token);
            } catch (err) {
                showError('Network error. Please try again or contact support.');
            }
        }

        function renderBooking(b, bookingId, token) {
            const sessionLabel = b.sessionType === 'truth' ? '🤔 Truth Session' : '🔥 Dare Session';
            const sessionPrice = b.sessionType === 'truth' ? '$15' : '$45';
            const sessionDuration = b.sessionType === 'truth' ? '5 minutes' : '15 minutes';

            // Determine displayed date/time
            const dateStr = b.proposedDate
                ? `${formatDate(b.proposedDate)} at ${b.proposedTime} <span style="color:#D4A574;font-size:11px;">(proposed by creator)</span>`
                : (b.requestedDate ? `${formatDate(b.requestedDate)} at ${b.requestedTime || 'TBD'}` : 'Flexible / TBD');

            if (b.status === 'paid' || b.status === 'confirmed_paid') {
                document.getElementById('content').innerHTML = `
                    <div class="status-icon">✅</div>
                    <h1>You're all set!</h1>
                    <p class="subtitle">Your session has been paid and confirmed. You'll receive an email with your room link before the session starts.</p>
                    <div class="details-box">
                        <div class="detail-row"><span class="detail-label">Creator</span><span class="detail-value">@${b.creatorHandle}</span></div>
                        <div class="detail-row"><span class="detail-label">Session</span><span class="detail-value">${sessionLabel}</span></div>
                        <div class="detail-row"><span class="detail-label">Duration</span><span class="detail-value">${sessionDuration}</span></div>
                        <div class="detail-row"><span class="detail-label">Date &amp; Time</span><span class="detail-value">${dateStr}</span></div>
                        <div class="detail-row"><span class="detail-label">Status</span><span class="badge paid">Paid ✓</span></div>
                    </div>`;
                return;
            }

            if (b.status === 'declined') {
                document.getElementById('content').innerHTML = `
                    <div class="status-icon">❌</div>
                    <h1>Booking Declined</h1>
                    <p class="subtitle">Unfortunately, the creator was unable to accept this booking request. No payment was taken.</p>
                    <p class="note">You can visit their profile to request a different time slot.</p>`;
                return;
            }

            // Status is 'accepted' or 'proposed' — fan can pay
            const isProposed = b.status === 'proposed';
            const headingText = isProposed ? 'New Time Proposed' : 'Your Booking is Confirmed!';
            const subText = isProposed
                ? 'The creator has proposed a new time for your session. If this works for you, complete payment below to confirm.'
                : 'The creator has accepted your request. Complete payment below to lock in your session.';
            const iconText = isProposed ? '📅' : '🎉';

            document.getElementById('content').innerHTML = `
                <div class="status-icon">${iconText}</div>
                <h1>${headingText}</h1>
                <p class="subtitle">${subText}</p>
                <div class="details-box">
                    <div class="detail-row"><span class="detail-label">Creator</span><span class="detail-value">@${b.creatorHandle}</span></div>
                    <div class="detail-row"><span class="detail-label">Session</span><span class="detail-value">${sessionLabel}</span></div>
                    <div class="detail-row"><span class="detail-label">Duration</span><span class="detail-value">${sessionDuration}</span></div>
                    <div class="detail-row"><span class="detail-label">Date &amp; Time</span><span class="detail-value">${dateStr}</span></div>
                    <div class="detail-row"><span class="detail-label">Amount</span><span class="detail-value">${sessionPrice}</span></div>
                </div>
                <button class="btn-pay" id="payBtn" onclick="startPayment('${bookingId}', '${token}')">
                    Pay ${sessionPrice} &amp; Confirm Session →
                </button>
                <p class="note">Secure payment via Stripe. You'll receive a room link by email once payment is complete.</p>
                ${isProposed ? `<hr class="divider"><p class="note" style="color:#FF6B6B;">If this time doesn't work, please contact the creator directly to request a different slot.</p>` : ''}`;
        }

        async function startPayment(bookingId, token) {
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = 'Redirecting to payment...';

            try {
                const res = await fetch(`${BACKEND}/booking/${bookingId}/checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token }),
                });
                const data = await res.json();
                if (res.ok && data.url) {
                    window.location.href = data.url;
                } else {
                    btn.disabled = false;
                    btn.textContent = 'Pay & Confirm Session →';
                    alert(data.error || 'Could not start payment. Please try again.');
                }
            } catch (err) {
                btn.disabled = false;
                btn.textContent = 'Pay & Confirm Session →';
                alert('Network error. Please try again.');
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'TBD';
            try {
                const d = new Date(dateStr + 'T00:00:00');
                return d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
            } catch { return dateStr; }
        }

        function showError(msg) {
            document.getElementById('content').innerHTML = `
                <div class="status-icon">⚠️</div>
                <h1 class="error-state">Something went wrong</h1>
                <p class="subtitle">${msg}</p>
                <p class="note"><a href="/" style="color:var(--gold);">Return to homepage</a></p>`;
        }

        loadBooking();
    </script>
</body>
</html>
