<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Profile | Truth or Dare For My Fans</title>
    <meta name="description" content="Book a live Truth or Dare session with your favourite creator. Pay securely, pick your time, and get ready for the fun.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a84c;
            --gold-light: #e8c96d;
            --dark: #0a0a0f;
            --dark-card: #12121a;
            --dark-border: #1e1e2e;
            --text-primary: #f0e6d3;
            --text-secondary: #a09080;
            --truth-color: #4a9eff;
            --dare-color: #ff4a6e;
            --green-online: #22c55e;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--dark);
            color: var(--text-primary);
            font-family: 'Raleway', sans-serif;
            min-height: 100vh;
        }
        /* ── HEADER ── */
        .site-header {
            background: rgba(10,10,15,0.95);
            border-bottom: 1px solid var(--dark-border);
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .site-logo {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: var(--gold);
            text-decoration: none;
        }
        .back-btn {
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-secondary);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-family: 'Raleway', sans-serif;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { border-color: var(--gold); color: var(--gold); }

        /* ── PROFILE HERO ── */
        .profile-hero {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            text-align: center;
        }
        .creator-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--gold);
            margin: 0 auto 20px;
            display: block;
            background: var(--dark-card);
        }
        .avatar-placeholder {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold);
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            background: var(--dark-card);
        }
        .creator-name-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .creator-name {
            font-family: 'Cinzel', serif;
            font-size: 28px;
            color: var(--gold-light);
        }
        .online-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--green-online);
            box-shadow: 0 0 8px var(--green-online);
            display: none;
        }
        .online-dot.visible { display: block; }
        .online-label {
            font-size: 12px;
            color: var(--green-online);
            font-weight: 600;
            display: none;
        }
        .online-label.visible { display: inline; }
        .creator-handle {
            color: var(--text-secondary);
            font-size: 15px;
            margin-bottom: 16px;
        }
        .creator-bio {
            color: var(--text-primary);
            font-size: 15px;
            line-height: 1.7;
            max-width: 560px;
            margin: 0 auto 24px;
        }

        /* ── SOCIAL LINKS ── */
        .social-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 32px;
        }
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 20px;
            border: 1px solid var(--dark-border);
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s;
        }
        .social-link:hover { border-color: var(--gold); color: var(--gold); }
        .social-link.onlyfans { border-color: #00aff0; color: #00aff0; }
        .social-link.onlyfans:hover { background: rgba(0,175,240,0.1); }
        .social-link.instagram { border-color: #e1306c; color: #e1306c; }
        .social-link.instagram:hover { background: rgba(225,48,108,0.1); }
        .social-link.fansly { border-color: #7c3aed; color: #7c3aed; }
        .social-link.fansly:hover { background: rgba(124,58,237,0.1); }
        .social-link.fansvue { border-color: #f97316; color: #f97316; }
        .social-link.fansvue:hover { background: rgba(249,115,22,0.1); }
        .social-link.luvelyfans { border-color: #ec4899; color: #ec4899; }
        .social-link.luvelyfans:hover { background: rgba(236,72,153,0.1); }
        .social-link.tiktok { border-color: #69c9d0; color: #69c9d0; }
        .social-link.tiktok:hover { background: rgba(105,201,208,0.1); }

        /* ── SESSION CARDS ── */
        .session-cards {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            max-width: 600px;
            margin: 0 auto 32px;
        }
        @media (max-width: 500px) { .session-cards { grid-template-columns: 1fr; } }
        .session-card {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 16px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.3s;
        }
        .session-card:hover { transform: translateY(-3px); }
        .session-card.truth { border-color: var(--truth-color); }
        .session-card.dare { border-color: var(--dare-color); }
        .session-card .emoji { font-size: 36px; margin-bottom: 12px; }
        .session-card h3 { font-family: 'Cinzel', serif; font-size: 20px; margin-bottom: 8px; }
        .session-card.truth h3 { color: var(--truth-color); }
        .session-card.dare h3 { color: var(--dare-color); }
        .session-card .duration { color: var(--text-secondary); font-size: 13px; margin-bottom: 6px; }
        .session-card .price { font-size: 28px; font-weight: 700; margin-bottom: 16px; }
        .session-card.truth .price { color: var(--truth-color); }
        .session-card.dare .price { color: var(--dare-color); }
        .btn-book {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 0.5px;
        }
        .btn-book.truth { background: var(--truth-color); color: #fff; }
        .btn-book.truth:hover { background: #3a8eef; }
        .btn-book.dare { background: var(--dare-color); color: #fff; }
        .btn-book.dare:hover { background: #ef3a5e; }
        .btn-book:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── NOTIFY BUTTON ── */
        .notify-section {
            text-align: center;
            margin-bottom: 40px;
        }
        .btn-notify {
            background: transparent;
            border: 1px solid var(--gold);
            color: var(--gold);
            padding: 12px 28px;
            border-radius: 10px;
            font-family: 'Raleway', sans-serif;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-notify:hover { background: rgba(201,168,76,0.1); }
        .notify-hint { color: var(--text-secondary); font-size: 12px; margin-top: 8px; }

        /* ── BOOKING MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }
        .modal-box {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 20px;
            color: var(--gold-light);
            margin-bottom: 8px;
        }
        .modal-box .modal-subtitle {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 24px;
        }
        .modal-section-label {
            font-size: 13px;
            font-weight: 600;
            color: var(--gold);
            margin-bottom: 10px;
            margin-top: 20px;
        }
        .date-grid, .time-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-bottom: 8px;
        }
        .time-grid { grid-template-columns: repeat(3, 1fr); }
        .slot-btn {
            background: var(--dark);
            border: 1px solid var(--dark-border);
            color: var(--text-secondary);
            padding: 8px 4px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-family: 'Raleway', sans-serif;
            transition: all 0.2s;
            text-align: center;
        }
        .slot-btn:hover, .slot-btn.selected {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(201,168,76,0.1);
        }
        .fan-info-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 20px;
        }
        .modal-input {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
        }
        .modal-input:focus { outline: none; border-color: var(--gold); }
        .modal-note {
            width: 100%;
            background: var(--dark);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            padding: 10px 14px;
            border-radius: 8px;
            font-family: 'Raleway', sans-serif;
            font-size: 13px;
            resize: none;
            margin-top: 12px;
        }
        .modal-note:focus { outline: none; border-color: var(--gold); }
        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn-modal-cancel {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--dark-border);
            color: var(--text-secondary);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-size: 14px;
        }
        .btn-modal-confirm {
            flex: 2;
            padding: 12px;
            background: var(--gold);
            border: none;
            color: var(--dark);
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Raleway', sans-serif;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }
        .btn-modal-confirm:hover { background: var(--gold-light); }
        .btn-modal-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── NOTIFY MODAL ── */
        .notify-modal-box {
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            border-radius: 20px;
            padding: 32px;
            max-width: 400px;
            width: 100%;
        }
        .notify-modal-box h3 {
            font-family: 'Cinzel', serif;
            font-size: 18px;
            color: var(--gold-light);
            margin-bottom: 8px;
        }
        .notify-modal-box p {
            color: var(--text-secondary);
            font-size: 13px;
            margin-bottom: 20px;
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--dark-card);
            border: 1px solid var(--dark-border);
            color: var(--text-primary);
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 14px;
            z-index: 9999;
            transition: transform 0.3s ease;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { border-color: var(--green-online); color: var(--green-online); }
        .toast.error { border-color: var(--dare-color); color: var(--dare-color); }

        /* ── LOADING ── */
        .loading-state {
            text-align: center;
            padding: 80px 20px;
            color: var(--text-secondary);
        }
        .not-found {
            text-align: center;
            padding: 80px 20px;
        }
        .not-found h2 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 12px; }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="site-header">
        <a href="/" class="site-logo">Truth or Dare For My Fans</a>
        <a href="/" class="back-btn">← Browse All Creators</a>
    </header>

    <!-- Main content (populated by JS) -->
    <main id="profile-root">
        <div class="loading-state">Loading creator profile...</div>
    </main>

    <!-- Booking Modal -->
    <div class="modal-overlay" id="bookingModal">
        <div class="modal-box">
            <h3 id="bookingModalTitle">Book Your Session</h3>
            <p class="modal-subtitle" id="bookingModalSubtitle">Choose a date and time. The creator will confirm shortly.</p>

            <div class="modal-section-label">📅 Pick a Date</div>
            <div class="date-grid" id="dateGrid"></div>

            <div class="modal-section-label">⏰ Pick a Time</div>
            <div class="time-grid" id="timeGrid"></div>

            <div class="fan-info-row">
                <input type="text" class="modal-input" id="fanName" placeholder="Your name">
                <input type="email" class="modal-input" id="fanEmail" placeholder="Your email">
            </div>
            <textarea class="modal-note" id="bookingNote" rows="2" maxlength="120" placeholder="Optional note (max 120 chars)..."></textarea>

            <div class="modal-actions">
                <button class="btn-modal-cancel" onclick="closeBookingModal()">Cancel</button>
                <button class="btn-modal-confirm" id="confirmBookingBtn" onclick="submitBooking()">Confirm Booking →</button>
            </div>
        </div>
    </div>

    <!-- Notify Modal -->
    <div class="modal-overlay" id="notifyModal">
        <div class="notify-modal-box">
            <h3>🔔 Notify Creator</h3>
            <p>Send a quick message to let the creator know you're interested in booking a session.</p>
            <input type="text" class="modal-input" id="notifyName" placeholder="Your name" style="margin-bottom:12px;">
            <input type="email" class="modal-input" id="notifyEmail" placeholder="Your email (so they can reply)">
            <div class="modal-actions" style="margin-top:20px;">
                <button class="btn-modal-cancel" onclick="closeNotifyModal()">Cancel</button>
                <button class="btn-modal-confirm" onclick="sendNotify()">Send Notification →</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const CONFIG = {
            backendUrl: 'https://truthordare-backend.onrender.com',
        };

        let currentCreator = null;
        let selectedDate = null;
        let selectedTime = null;
        let pendingSessionType = null;

        // ── LOAD CREATOR ──────────────────────────────────────────────────────────
        async function loadCreator() {
            const path = window.location.pathname; // e.g. /creator/jessica or /@jessica
            const parts = path.split('/').filter(Boolean);
            let handle = parts[parts.length - 1];
            if (!handle) { showNotFound(); return; }
            handle = handle.replace('@', '');

            try {
                const res = await fetch(`${CONFIG.backendUrl}/creator/${handle}`);
                if (!res.ok) { showNotFound(); return; }
                const data = await res.json();
                currentCreator = data.creator;
                renderProfile(currentCreator);
                // Update page title
                document.title = `${currentCreator.name} | Truth or Dare For My Fans`;
            } catch (e) {
                showNotFound();
            }
        }

        function showNotFound() {
            document.getElementById('profile-root').innerHTML = `
                <div class="not-found">
                    <h2>Creator Not Found</h2>
                    <p style="color:var(--text-secondary);margin-bottom:24px;">This creator profile doesn't exist or may have been removed.</p>
                    <a href="/" class="back-btn" style="display:inline-block;padding:12px 24px;">← Browse All Creators</a>
                </div>`;
        }

        function renderProfile(c) {
            const socials = c.socials || {};
            const socialLinks = buildSocialLinks(socials, c.handle);

            const avatarHtml = c.photo
                ? `<img src="${c.photo}" alt="${c.name}" class="creator-avatar">`
                : `<div class="avatar-placeholder">🎭</div>`;

            const onlineClass = c.isLive ? 'visible' : '';

            document.getElementById('profile-root').innerHTML = `
                <div class="profile-hero">
                    ${avatarHtml}
                    <div class="creator-name-row">
                        <h1 class="creator-name">${escHtml(c.name)}</h1>
                        <span class="online-dot ${onlineClass}" title="Online now"></span>
                        <span class="online-label ${onlineClass}">Online</span>
                    </div>
                    <div class="creator-handle">${escHtml(c.handle || '')}</div>
                    ${c.bio ? `<p class="creator-bio">${escHtml(c.bio)}</p>` : ''}
                    ${socialLinks ? `<div class="social-links">${socialLinks}</div>` : ''}

                    <!-- Session Cards -->
                    <div class="session-cards">
                        <div class="session-card truth">
                            <div class="emoji">🎯</div>
                            <h3>TRUTH</h3>
                            <div class="duration">5-minute session</div>
                            <div class="price">$15 USD</div>
                            <button class="btn-book truth" onclick="openBooking('truth')">Book Truth Session</button>
                        </div>
                        <div class="session-card dare">
                            <div class="emoji">🔥</div>
                            <h3>DARE</h3>
                            <div class="duration">15-minute session</div>
                            <div class="price">$45 USD</div>
                            <button class="btn-book dare" onclick="openBooking('dare')">Book Dare Session</button>
                        </div>
                    </div>

                    <!-- Notify -->
                    <div class="notify-section">
                        <button class="btn-notify" onclick="openNotifyModal()">🔔 Notify Creator I'm Interested</button>
                        <div class="notify-hint">Not ready to book yet? Let the creator know you're interested.</div>
                    </div>
                </div>`;
        }

        function buildSocialLinks(socials, handle) {
            const links = [];
            if (socials.onlyfans) links.push(`<a href="https://onlyfans.com/${socials.onlyfans.replace('@','')}" target="_blank" class="social-link onlyfans">🔞 OnlyFans</a>`);
            if (socials.instagram) links.push(`<a href="https://instagram.com/${socials.instagram.replace('@','')}" target="_blank" class="social-link instagram">📸 Instagram</a>`);
            if (socials.fansly) links.push(`<a href="https://fansly.com/${socials.fansly.replace('@','')}" target="_blank" class="social-link fansly">💜 Fansly</a>`);
            if (socials.fansvue) links.push(`<a href="https://fansvue.com/${socials.fansvue.replace('@','')}" target="_blank" class="social-link fansvue">🧡 FansVue</a>`);
            if (socials.luvelyfans) links.push(`<a href="https://luvelyfans.com/${socials.luvelyfans.replace('@','')}" target="_blank" class="social-link luvelyfans">💗 LuvlyFans</a>`);
            if (socials.tiktok) links.push(`<a href="https://tiktok.com/@${socials.tiktok.replace('@','')}" target="_blank" class="social-link tiktok">🎵 TikTok</a>`);
            return links.join('');
        }

        // ── BOOKING MODAL ─────────────────────────────────────────────────────────
        function openBooking(sessionType) {
            pendingSessionType = sessionType;
            const title = sessionType === 'truth' ? '🎯 Book a Truth Session — $15 USD' : '🔥 Book a Dare Session — $45 USD';
            document.getElementById('bookingModalTitle').textContent = title;
            document.getElementById('bookingModalSubtitle').textContent =
                `Pick a date and time. ${currentCreator.name} will confirm or suggest an alternative.`;
            buildDateGrid();
            buildTimeGrid();
            selectedDate = null;
            selectedTime = null;
            document.getElementById('bookingModal').classList.add('active');
        }

        function closeBookingModal() {
            document.getElementById('bookingModal').classList.remove('active');
            pendingSessionType = null;
        }

        function buildDateGrid() {
            const grid = document.getElementById('dateGrid');
            grid.innerHTML = '';
            const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            for (let i = 0; i < 7; i++) {
                const d = new Date();
                d.setDate(d.getDate() + i);
                const label = i === 0 ? 'Today' : i === 1 ? 'Tomorrow' : `${days[d.getDay()]} ${d.getDate()} ${months[d.getMonth()]}`;
                const value = d.toISOString().split('T')[0];
                const btn = document.createElement('button');
                btn.className = 'slot-btn';
                btn.textContent = label;
                btn.dataset.value = value;
                btn.onclick = () => {
                    document.querySelectorAll('#dateGrid .slot-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedDate = value;
                };
                grid.appendChild(btn);
            }
        }

        function buildTimeGrid() {
            const grid = document.getElementById('timeGrid');
            grid.innerHTML = '';
            const slots = ['9:00 AM','9:30 AM','10:00 AM','10:30 AM','11:00 AM','11:30 AM',
                           '12:00 PM','12:30 PM','1:00 PM','1:30 PM','2:00 PM','2:30 PM',
                           '3:00 PM','3:30 PM','4:00 PM','4:30 PM','5:00 PM','5:30 PM',
                           '6:00 PM','6:30 PM','7:00 PM','7:30 PM','8:00 PM','8:30 PM',
                           '9:00 PM','9:30 PM','10:00 PM','10:30 PM'];
            slots.forEach(slot => {
                const btn = document.createElement('button');
                btn.className = 'slot-btn';
                btn.textContent = slot;
                btn.dataset.value = slot;
                btn.onclick = () => {
                    document.querySelectorAll('#timeGrid .slot-btn').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTime = slot;
                };
                grid.appendChild(btn);
            });
        }

        async function submitBooking() {
            const fanName = document.getElementById('fanName').value.trim();
            const fanEmail = document.getElementById('fanEmail').value.trim();
            const note = document.getElementById('bookingNote').value.trim();

            if (!selectedDate) { showToast('Please select a date.', 'error'); return; }
            if (!selectedTime) { showToast('Please select a time.', 'error'); return; }
            if (!fanName) { showToast('Please enter your name.', 'error'); return; }
            if (!fanEmail) { showToast('Please enter your email.', 'error'); return; }

            const btn = document.getElementById('confirmBookingBtn');
            btn.disabled = true;
            btn.textContent = 'Processing...';

            try {
                // First create a Stripe checkout session
                const priceRes = await fetch(`${CONFIG.backendUrl}/create-checkout`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        sessionType: pendingSessionType,
                        creatorHandle: currentCreator.handle,
                        fanName,
                        fanEmail,
                        bookingDate: selectedDate,
                        bookingTime: selectedTime,
                        note,
                    }),
                });
                const priceData = await priceRes.json();
                if (!priceRes.ok) throw new Error(priceData.error || 'Payment setup failed.');
                // Redirect to Stripe checkout
                window.location.href = priceData.url;
            } catch (e) {
                showToast('Booking failed: ' + e.message, 'error');
                btn.disabled = false;
                btn.textContent = 'Confirm Booking →';
            }
        }

        // ── NOTIFY MODAL ──────────────────────────────────────────────────────────
        function openNotifyModal() {
            document.getElementById('notifyModal').classList.add('active');
        }
        function closeNotifyModal() {
            document.getElementById('notifyModal').classList.remove('active');
        }

        async function sendNotify() {
            const name = document.getElementById('notifyName').value.trim();
            const email = document.getElementById('notifyEmail').value.trim();
            if (!name || !email) { showToast('Please enter your name and email.', 'error'); return; }
            try {
                await fetch(`${CONFIG.backendUrl}/notify-creator`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ creatorHandle: currentCreator.handle, fanName: name, fanEmail: email }),
                });
                showToast('✓ Creator notified! They\'ll reach out soon.', 'success');
                closeNotifyModal();
            } catch (e) {
                showToast('Could not send notification.', 'error');
            }
        }

        // ── UTILS ─────────────────────────────────────────────────────────────────
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type ? ' ' + type : '');
            setTimeout(() => { t.className = 'toast'; }, 3500);
        }

        function escHtml(str) {
            return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // Close modals on overlay click
        document.getElementById('bookingModal').addEventListener('click', function(e) {
            if (e.target === this) closeBookingModal();
        });
        document.getElementById('notifyModal').addEventListener('click', function(e) {
            if (e.target === this) closeNotifyModal();
        });

        // Load on page start
        loadCreator();
    </script>
</body>
</html>
